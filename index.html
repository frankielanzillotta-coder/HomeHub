                { name: 'WC Floors', rating: 5.0, reviews: 50, website: 'https://www.wcfloors.com/', phone: '(908) 399-4408', description: '24+ years experience. Hardwood, refinishing, vinyl, laminate. A+ BBB rated.', price: '$1500-8000', badge: true, area: 'North NJ' },
                { name: 'Supreme Flooring LLC', rating: 4.8, reviews: 200, website: 'https://www.supremeflooringllc.com/', phone: '(732) 778-4239', description: 'Top-rated NJ flooring. 12+ years. Hardwood, tile, vinyl, carpet, dust containment.', price: '$1200-7500', badge: true, area: 'Central NJ' },
                // CT
                { name: 'MPR Flooring', rating: 4.6, reviews: 95, website: 'https://www.mprflooring.com', phone: '(860) 836-5414', description: '20+ years serving Hartford area. Hardwood, vinyl, laminate, and tile installations.', price: '$3000-12000', badge: true, area: 'Hartford County, CT' },
                { name: 'Connecticut Flooring', rating: 4.5, reviews: 70, website: 'https://www.woodflooringct.com', phone: '(860) 818-7553', description: 'CT\'s top flooring contractor. 25+ years. Hardwood, carpet, luxury vinyl, tile.', price: '$2500-11000', badge: true, area: 'All CT' },
            ],
        };

        const bundlePackages = [
            { id: 1, name: 'Starter', price: 299, services: 4, duration: '3 months', features: ['4 service calls', 'Priority booking', '10% discount'] },
            { id: 2, name: 'Professional', price: 499, services: 8, duration: '3 months', features: ['8 service calls', 'Priority booking', '15% discount', '24/7 support'] },
            { id: 3, name: 'Enterprise', price: 799, services: 12, duration: '3 months', features: ['12 service calls', 'Priority booking', '20% discount', '24/7 support', 'Dedicated manager'] },
            { id: 4, name: 'Ultimate', price: 1099, services: 16, duration: '3 months', features: ['16 service calls', 'Priority booking', '25% discount', '24/7 support', 'Dedicated manager', 'Quarterly reviews'] }
        ];

        // Calendar helper functions
        const daysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        const firstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();
        const isWeekend = (day, firstDay) => {
            const dayOfWeek = (firstDay + day - 1) % 7;
            return dayOfWeek === 0 || dayOfWeek === 6;
        };
        const isPast = (day, month, year) => {
            const today = new Date();
            return day < today.getDate() && month === today.getMonth() && year === today.getFullYear();
        };
        const isToday = (day, month, year) => {
            const today = new Date();
            return day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        };

        // Calendar Section Component
        const CalendarSection = ({ provider, earnPoints, goToCheckout }) => {
            const [month, setMonth] = useState(new Date().getMonth());
            const [year, setYear] = useState(new Date().getFullYear());
            const [selectedDay, setSelectedDay] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [showPayment, setShowPayment] = useState(false);

            const getServicePrice = () => {
                if (!provider.price) return 150;
                const match = provider.price.match(/\$([0-9,]+)/);
                return match ? parseInt(match[1].replace(',', '')) : 150;
            };

            const days = daysInMonth(new Date(year, month));
            const firstDay = firstDayOfMonth(new Date(year, month));
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            const timeSlots = ['8:00 AM', '9:00 AM', '10:00 AM', '11:00 AM', '12:00 PM', '1:00 PM', '2:00 PM', '3:00 PM', '4:00 PM'];
            const bookedSlots = [1, 5]; // Random booked slots

            const handlePreviousMonth = () => {
                if (month === 0) {
                    setMonth(11);
                    setYear(year - 1);
                } else {
                    setMonth(month - 1);
                }
                setSelectedDay(null);
                setSelectedTime(null);
            };

            const handleNextMonth = () => {
                if (month === 11) {
                    setMonth(0);
                    setYear(year + 1);
                } else {
                    setMonth(month + 1);
                }
                setSelectedDay(null);
                setSelectedTime(null);
            };

            const handleConfirmBooking = () => {
                setBookingConfirmed(true);
                setTimeout(() => setBookingConfirmed(false), 3000);
            };

            return (
                <div className="bg-gray-800 rounded-lg p-6 border border-gray-700 mt-4">
                    <h3 className="text-xl font-semibold text-white mb-4">Book {provider.name}</h3>

                    {/* Month Navigation */}
                    <div className="flex items-center justify-between mb-6">
                        <button onClick={handlePreviousMonth} className="p-2 hover:bg-gray-700 rounded text-white">
                            <Icon name="chevronLeft" size={20} />
                        </button>
                        <h4 className="text-lg font-semibold text-white">{monthNames[month]} {year}</h4>
                        <button onClick={handleNextMonth} className="p-2 hover:bg-gray-700 rounded text-white">
                            <Icon name="chevronRight" size={20} />
                        </button>
                    </div>

                    {/* Calendar Grid */}
                    <div className="grid grid-cols-7 gap-2 mb-6">
                        {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                            <div key={day} className="text-center text-gray-400 text-sm font-semibold p-2">
                                {day}
                            </div>
                        ))}
                        {Array.from({ length: firstDay }).map((_, i) => (
                            <div key={`empty-${i}`} className="p-2" />
                        ))}
                        {Array.from({ length: days }).map((_, i) => {
                            const day = i + 1;
                            const isDisabled = isPast(day, month, year) || isWeekend(day, firstDay);
                            const highlighted = isToday(day, month, year);
                            const selected = selectedDay === day;

                            return (
                                <button
                                    key={day}
                                    onClick={() => !isDisabled && setSelectedDay(day)}
                                    disabled={isDisabled}
                                    className={`p-2 rounded text-center font-semibold transition ${
                                        isDisabled ? 'text-gray-600 cursor-not-allowed' :
                                        highlighted ? 'ring-2 ring-amber-500 text-white bg-gray-700' :
                                        selected ? 'bg-blue-600 text-white' :
                                        'bg-green-900/50 text-green-400 hover:bg-green-800/50'
                                    }`}
                                >
                                    {day}
                                </button>
                            );
                        })}
                    </div>

                    {/* Time Slots */}
                    {selectedDay && (
                        <div className="mb-6">
                            <h5 className="text-white font-semibold mb-3">Select Time: {monthNames[month]} {selectedDay}</h5>
                            <div className="grid grid-cols-3 gap-2">
                                {timeSlots.map((time, idx) => (
                                    <button
                                        key={time}
                                        onClick={() => setSelectedTime(time)}
                                        disabled={bookedSlots.includes(idx)}
                                        className={`p-2 rounded text-sm transition ${
                                            bookedSlots.includes(idx) ? 'bg-red-900/30 text-red-400 cursor-not-allowed' :
                                            selectedTime === time ? 'bg-blue-600 text-white' :
                                            'bg-gray-700 text-white hover:bg-gray-600'
                                        }`}
                                    >
                                        {time}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Booking Confirmation */}
                    {selectedDay && selectedTime && !bookingConfirmed && (
                        <button
                            onClick={() => {
                                if (goToCheckout) {
                                    goToCheckout({ ...provider, date: monthNames[month] + ' ' + selectedDay + ', ' + year, time: selectedTime });
                                } else {
                                    setShowPayment(true);
                                }
                            }}
                            className="w-full bg-green-600 hover:bg-green-500 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2"

                            <Icon name="creditCard" size={18} /> Proceed to Checkout — ${getServicePrice()}
                        </button>
                    )}

                    {bookingConfirmed && (
                        <div className="mt-4 p-4 bg-green-900/30 border border-green-600 rounded-lg">
                            <div className="flex items-center gap-2 text-green-400 font-semibold mb-1">
                                <Icon name="check" size={18} /> Booking Confirmed & Paid!
                            </div>
                            <p className="text-green-400/80 text-sm">{provider.name} — {monthNames[month]} {selectedDay} at {selectedTime}</p>
                        </div>
                    )}

                    <PaymentModal
                        isOpen={showPayment}
                        onClose={() => setShowPayment(false)}
                        amount={getServicePrice()}
                        description={`${provider.name} — ${monthNames[month]} ${selectedDay} at ${selectedTime}`}
                        onSuccess={() => { setShowPayment(false); setBookingConfirmed(true); if (earnPoints) earnPoints(50, 'Vendor booking completed'); }}
                    />
                </div>
            );
        };

        // Payment Modal Component
        const PaymentModal = ({ isOpen, onClose, amount, description, onSuccess }) => {
            const [paymentMethod, setPaymentMethod] = useState('card');
            const [cardNumber, setCardNumber] = useState('');
            const [cardName, setCardName] = useState('');
            const [expiry, setExpiry] = useState('');
            const [cvv, setCvv] = useState('');
            const [processing, setProcessing] = useState(false);
            const [completed, setCompleted] = useState(false);
            const [saveCard, setSaveCard] = useState(false);
            const [promoCode, setPromoCode] = useState('');
            const [promoApplied, setPromoApplied] = useState(false);
            const [discount, setDiscount] = useState(0);

            const formatCardNumber = (value) => {
                const v = value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
                const matches = v.match(/\d{4,16}/g);
                const match = matches && matches[0] || '';
                const parts = [];
                for (let i = 0, len = match.length; i < len; i += 4) {
                    parts.push(match.substring(i, i + 4));
                }
                return parts.length ? parts.join(' ') : v;
            };

            const formatExpiry = (value) => {
                const v = value.replace(/[^0-9]/g, '');
                if (v.length >= 2) return v.substring(0, 2) + '/' + v.substring(2, 4);
                return v;
            };

            const getCardType = () => {
                const num = cardNumber.replace(/\s/g, '');
                if (num.startsWith('4')) return { name: 'Visa', color: 'text-blue-400' };
                if (num.startsWith('5') || num.startsWith('2')) return { name: 'Mastercard', color: 'text-red-400' };
                if (num.startsWith('3')) return { name: 'Amex', color: 'text-green-400' };
                if (num.startsWith('6')) return { name: 'Discover', color: 'text-amber-400' };
                return null;
            };

            const applyPromo = () => {
                const codes = { 'HOMEHUB20': 20, 'WELCOME10': 10, 'SAVE15': 15, 'FIRST25': 25 };
                if (codes[promoCode.toUpperCase()]) {
                    setDiscount(codes[promoCode.toUpperCase()]);
                    setPromoApplied(true);
                }
            };

            const finalAmount = promoApplied ? (amount * (1 - discount / 100)).toFixed(2) : amount.toFixed(2);

            const handlePay = () => {
                setProcessing(true);
                setTimeout(() => {
                    setProcessing(false);
                    setCompleted(true);
                    if (onSuccess) setTimeout(() => onSuccess(), 2000);
                }, 2000);
            };

            const isCardValid = cardNumber.replace(/\s/g, '').length >= 15 && cardName.length > 2 && expiry.length === 5 && cvv.length >= 3;

            const handleClose = () => {
                setPaymentMethod('card');
                setCardNumber('');
                setCardName('');
                setExpiry('');
                setCvv('');
                setProcessing(false);
                setCompleted(false);
                setSaveCard(false);
                setPromoCode('');
                setPromoApplied(false);
                setDiscount(0);
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onClick={(e) => e.target === e.currentTarget && !processing && handleClose()}>
                    <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
                        {/* Header */}
                        <div className="flex items-center justify-between p-6 border-b border-gray-700">
                            <div>
                                <h2 className="text-xl font-bold text-white">
                                    {completed ? 'Payment Successful!' : processing ? 'Processing...' : 'Complete Payment'}
                                </h2>
                                {!completed && !processing && <p className="text-gray-400 text-sm mt-1">{description}</p>}
                            </div>
                            {!processing && <button onClick={handleClose} className="text-gray-400 hover:text-white transition"><Icon name="x" size={24} /></button>}
                        </div>

                        <div className="p-6">
                            {/* Completed State */}
                            {completed && (
                                <div className="text-center py-8 space-y-4">
                                    <div className="bg-green-600/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto">
                                        <Icon name="check" size={40} className="text-green-400" />
                                    </div>
                                    <h3 className="text-2xl font-bold text-white">Thank You!</h3>
                                    <p className="text-gray-400">Your payment of <span className="text-green-400 font-bold">${finalAmount}</span> has been processed successfully.</p>
                                    <div className="bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-left space-y-2">
                                        <div className="flex justify-between"><span className="text-gray-400">Transaction ID:</span><span className="text-white font-mono">TXN-{Math.random().toString(36).substr(2, 10).toUpperCase()}</span></div>
                                        <div className="flex justify-between"><span className="text-gray-400">Amount:</span><span className="text-green-400 font-bold">${finalAmount}</span></div>
                                        <div className="flex justify-between"><span className="text-gray-400">Method:</span><span className="text-white capitalize">{paymentMethod === 'card' ? (getCardType()?.name || 'Card') + ' ••••' + cardNumber.slice(-4) : paymentMethod}</span></div>
                                        <div className="flex justify-between"><span className="text-gray-400">Status:</span><span className="text-green-400 font-semibold">Confirmed</span></div>
                                    </div>
                                    <button onClick={handleClose} className="w-full py-3 rounded-xl font-bold bg-blue-600 hover:bg-blue-500 text-white transition mt-4">Done</button>
                                </div>
                            )}

                            {/* Processing State */}
                            {processing && (
                                <div className="text-center py-16 space-y-4">
                                    <div className="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                                    <p className="text-gray-400">Securely processing your payment...</p>
                                    <p className="text-gray-500 text-sm">Please do not close this window</p>
                                </div>
                            )}

                            {/* Payment Form */}
                            {!completed && !processing && (
                                <div className="space-y-6">
                                    {/* Order Summary */}
                                    <div className="bg-gray-800 border border-gray-700 rounded-xl p-4">
                                        <div className="flex justify-between items-center">
                                            <span className="text-gray-400">Subtotal</span>
                                            <span className="text-white font-semibold">${amount.toFixed(2)}</span>
                                        </div>
                                        {promoApplied && (
                                            <div className="flex justify-between items-center mt-2">
                                                <span className="text-green-400 text-sm">Promo ({promoCode.toUpperCase()}) -{discount}%</span>
                                                <span className="text-green-400 font-semibold">-${(amount * discount / 100).toFixed(2)}</span>
                                            </div>
                                        )}
                                        <div className="border-t border-gray-700 mt-3 pt-3 flex justify-between items-center">
                                            <span className="text-white font-bold">Total</span>
                                            <span className="text-2xl font-bold text-blue-400">${finalAmount}</span>
                                        </div>
                                    </div>

                                    {/* Promo Code */}
                                    {!promoApplied && (
                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                value={promoCode}
                                                onChange={(e) => setPromoCode(e.target.value)}
                                                placeholder="Promo code"
                                                className="flex-1 bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-2 text-sm placeholder-gray-500 focus:outline-none focus:border-blue-500"
                                            />
                                            <button onClick={applyPromo} className="bg-gray-700 hover:bg-gray-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">Apply</button>
                                        </div>
                                    )}

                                    {/* Payment Method Tabs */}
                                    <div>
                                        <label className="block text-white font-semibold mb-3">Payment Method</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {[
                                                { id: 'card', label: 'Card', icon: 'creditCard' },
                                                { id: 'apple', label: 'Apple Pay', icon: 'shield' },
                                                { id: 'google', label: 'Google Pay', icon: 'shield' },
                                                { id: 'paypal', label: 'PayPal', icon: 'dollarSign' },
                                            ].map(method => (
                                                <button
                                                    key={method.id}
                                                    onClick={() => setPaymentMethod(method.id)}
                                                    className={`p-3 rounded-xl border text-center transition ${
                                                        paymentMethod === method.id
                                                            ? 'bg-blue-600/20 border-blue-500 text-blue-400'
                                                            : 'bg-gray-800 border-gray-700 text-gray-400 hover:border-gray-500'
                                                    }`}
                                                >
                                                    <Icon name={method.icon} size={20} className="mx-auto mb-1" />
                                                    <span className="text-xs font-semibold block">{method.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Card Form */}
                                    {paymentMethod === 'card' && (
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-gray-400 text-sm font-semibold mb-2">Card Number</label>
                                                <div className="relative">
                                                    <input
                                                        type="text"
                                                        value={cardNumber}
                                                        onChange={(e) => setCardNumber(formatCardNumber(e.target.value))}
                                                        maxLength={19}
                                                        placeholder="1234 5678 9012 3456"
                                                        className="w-full bg-gray-800 border border-gray-600 text-white rounded-xl px-4 py-3 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition pr-20"
                                                    />
                                                    {getCardType() && (
                                                        <span className={`absolute right-4 top-3.5 text-sm font-bold ${getCardType().color}`}>{getCardType().name}</span>
                                                    )}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-gray-400 text-sm font-semibold mb-2">Cardholder Name</label>
                                                <input
                                                    type="text"
                                                    value={cardName}
                                                    onChange={(e) => setCardName(e.target.value)}
                                                    placeholder="John Doe"
                                                    className="w-full bg-gray-800 border border-gray-600 text-white rounded-xl px-4 py-3 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
                                                />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-gray-400 text-sm font-semibold mb-2">Expiry</label>
                                                    <input
                                                        type="text"
                                                        value={expiry}
                                                        onChange={(e) => setExpiry(formatExpiry(e.target.value))}
                                                        maxLength={5}
                                                        placeholder="MM/YY"
                                                        className="w-full bg-gray-800 border border-gray-600 text-white rounded-xl px-4 py-3 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-gray-400 text-sm font-semibold mb-2">CVV</label>
                                                    <input
                                                        type="password"
                                                        value={cvv}
                                                        onChange={(e) => setCvv(e.target.value.replace(/[^0-9]/g, '').slice(0, 4))}
                                                        maxLength={4}
                                                        placeholder="•••"
                                                        className="w-full bg-gray-800 border border-gray-600 text-white rounded-xl px-4 py-3 placeholder-gray-500 focus:outline-none focus:border-blue-500 transition"
                                                    />
                                                </div>
                                            </div>
                                            <label className="flex items-center gap-3 cursor-pointer">
                                                <input type="checkbox" checked={saveCard} onChange={() => setSaveCard(!saveCard)} className="w-4 h-4 rounded border-gray-600" />
                                                <span className="text-gray-400 text-sm">Save card for future payments</span>
                                            </label>
                                        </div>
                                    )}

                                    {/* Alternative Payment Methods */}
                                    {paymentMethod === 'apple' && (
                                        <div className="bg-gray-800 border border-gray-700 rounded-xl p-8 text-center">
                                            <div className="bg-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                                <span className="text-black text-2xl font-bold"></span>
                                            </div>
                                            <p className="text-gray-400 mb-4">Click below to pay with Apple Pay</p>
                                        </div>
                                    )}

                                    {paymentMethod === 'google' && (
                                        <div className="bg-gray-800 border border-gray-700 rounded-xl p-8 text-center">
                                            <div className="bg-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                                <span className="text-2xl font-bold text-blue-500">G</span>
                                            </div>
                                            <p className="text-gray-400 mb-4">Click below to pay with Google Pay</p>
                                        </div>
                                    )}

                                    {paymentMethod === 'paypal' && (
                                        <div className="bg-gray-800 border border-gray-700 rounded-xl p-8 text-center">
                                            <div className="bg-blue-700 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                                <span className="text-white text-xl font-bold">PP</span>
                                            </div>
                                            <p className="text-gray-400 mb-4">Click below to pay with PayPal</p>
                                        </div>
                                    )}

                                    {/* Pay Button */}
                                    <button
                                        onClick={handlePay}
                                        disabled={paymentMethod === 'card' && !isCardValid}
                                        className={`w-full py-4 rounded-xl font-bold text-lg transition flex items-center justify-center gap-2 ${
                                            paymentMethod !== 'card' || isCardValid
                                                ? 'bg-green-600 hover:bg-green-500 text-white'
                                                : 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                        }`}
                                    >
                                        <Icon name="shield" size={20} /> Pay ${finalAmount}
                                    </button>

                                    {/* Security Badge */}
                                    <div className="flex items-center justify-center gap-4 text-gray-500 text-xs">
                                        <span className="flex items-center gap-1"><Icon name="shield" size={14} /> SSL Encrypted</span>
                                        <span className="flex items-center gap-1"><Icon name="lock" size={14} /> PCI Compliant</span>
                                        <span className="flex items-center gap-1"><Icon name="check" size={14} /> Secure Checkout</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Home Page Component
        const HomePage = ({ setSelectedServiceCategory, setCurrentPage, loyaltyPoints, earnPoints }) => {
            const [showTaskForm, setShowTaskForm] = useState(false);
            const [taskStep, setTaskStep] = useState(1);
            const [taskData, setTaskData] = useState({ description: '', category: '', urgency: '', date: '', time: '', name: '', phone: '', address: '', borough: '' });
            const [taskSubmitted, setTaskSubmitted] = useState(false);
            const [matchedVendors, setMatchedVendors] = useState([]);
            const [showHomePayment, setShowHomePayment] = useState(false);
            const [homePaymentItem, setHomePaymentItem] = useState(null);
            const [heroSlide, setHeroSlide] = useState(0);

            const heroImages = [
                { url: 'https://images.unsplash.com/photo-1534430480872-3498386e7856?w=1600&q=80', label: 'NYC Skyline' },
                { url: 'https://images.unsplash.com/photo-1581578731548-c64695cc6952?w=1600&q=80', label: 'Professional Cleaning' },
                { url: 'https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=1600&q=80', label: 'Home Renovation' },
                { url: 'https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=1600&q=80', label: 'Plumbing Services' },

                'pest': 'Pest Control', 'bug': 'Pest Control', 'exterminator': 'Pest Control', 'rat': 'Pest Control', 'mouse': 'Pest Control', 'roach': 'Pest Control', 'bed bug': 'Pest Control', 'termite': 'Pest Control',
                'appliance': 'Appliance Repair', 'fridge': 'Appliance Repair', 'refrigerator': 'Appliance Repair', 'washer': 'Appliance Repair', 'dryer': 'Appliance Repair', 'dishwasher': 'Appliance Repair', 'oven': 'Appliance Repair', 'stove': 'Appliance Repair',
                'handyman': 'Handyman', 'fix': 'Handyman', 'repair': 'Handyman', 'mount': 'Handyman', 'assemble': 'Handyman', 'furniture': 'Handyman', 'shelf': 'Handyman',
                'move': 'Moving', 'mover': 'Moving', 'relocat': 'Moving', 'moving': 'Moving', 'packing': 'Moving',
                'floor': 'Flooring', 'hardwood': 'Flooring', 'tile': 'Flooring', 'carpet': 'Flooring', 'laminate': 'Flooring', 'vinyl': 'Flooring',
            };

            // Detect categories from free-text search
            const detectCategories = (text) => {
                const lower = text.toLowerCase();
                const matched = new Set();
                Object.entries(keywordMap).forEach(([keyword, category]) => {
                    if (lower.includes(keyword)) matched.add(category);
                });
                return [...matched];
            };

            const getMinPrice = (priceStr) => {
                const match = priceStr.match(/\$([0-9,]+)/);
                return match ? parseInt(match[1].replace(',', '')) : 0;
            };

            // Get all vendors across all or matched categories
            const getMatchedVendors = () => {
                let categories = [];
                if (selectedCategory !== 'All') {
                    categories = [selectedCategory];
                } else if (searchText.trim()) {
                    categories = detectCategories(searchText);
                }
                if (categories.length === 0 && (hasSearched || selectedCategory !== 'All')) {
                    categories = Object.keys(nycVendors);
                }
                if (categories.length === 0) return [];

                let results = [];
                categories.forEach(cat => {
                    (nycVendors[cat] || []).forEach(v => {
                        results.push({ ...v, category: cat });
                    });
                });

                // Text filter on name/description
                if (searchText.trim()) {
                    const lower = searchText.toLowerCase();
                    results = results.filter(v =>
                        v.name.toLowerCase().includes(lower) ||
                        v.description.toLowerCase().includes(lower) ||
                        v.category.toLowerCase().includes(lower)
                    );
                    // If text filter returns nothing, show all in matched categories
                    if (results.length === 0) {
                        categories.forEach(cat => {
                            (nycVendors[cat] || []).forEach(v => {
                                results.push({ ...v, category: cat });
                            });
                        });

                }

                // Apply filters
                results = results.filter(v => {
                    if (minRating > 0 && v.rating < minRating) return false;
                    if (verifiedOnly && !v.badge) return false;
                    if (locationFilter !== 'All' && !v.area.includes(locationFilter) && !v.area.includes('All') || v.area.includes('NYC, NJ, CT')) return false;
                    return true;
                });

                // Sort
                results.sort((a, b) => {
                    if (sortBy === 'rating') return b.rating - a.rating;
                    if (sortBy === 'reviews') return b.reviews - a.reviews;
                    if (sortBy === 'price_low') return getMinPrice(a.price) - getMinPrice(b.price);
                    if (sortBy === 'price_high') return getMinPrice(b.price) - getMinPrice(a.price);
                    return 0;
                });
                return results;
            };

            const matchedVendors = hasSearched || selectedCategory !== 'All' ? getMatchedVendors() : [];
            const detectedCats = searchText.trim() ? detectCategories(searchText) : [];

            const handleSearch = (e) => {
                e.preventDefault();
                setHasSearched(true);
            };

            return (
                <div className="space-y-8">

                        {searchText.trim() && detectedCats.length > 0 && (
                            <div className="flex flex-wrap justify-center gap-2 mt-4">

                                    <span key={cat} className="bg-blue-600/30 text-blue-300 text-sm font-semibold px-3 py-1 rounded-full">{cat}</span>

                            </div>
                        )}

                    {/* Quick Category Buttons */}
                    <div>

                            <button onClick={() => { setSelectedCategory('All'); setHasSearched(true); }} className={`px-4 py-2 rounded-lg text-sm font-semibold transition ${selectedCategory === 'All' && hasSearched ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-300 border border-gray-700 hover:border-blue-500'}`}>All Services</button>

                                <button key={cat.id} onClick={() => { setSelectedCategory(cat.name); setHasSearched(true); }} className={`px-4 py-2 rounded-lg text-sm font-semibold transition ${selectedCategory === cat.name ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-300 border border-gray-700 hover:border-blue-500'}`}>
                                    {cat.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Filters Row (show after searching) */}
                    {hasSearched && (

                                    <label className="block text-gray-400 text-xs font-semibold mb-1">Sort By</label>
                                    <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">

                                    <label className="block text-gray-400 text-xs font-semibold mb-1">Min Rating</label>

                                        {[0, 4.5, 4.7, 4.9].map(r => (
                                            <button key={r} onClick={() => setMinRating(r)} className={`flex-1 py-2 rounded text-xs font-semibold transition ${minRating === r ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>
                                                {r === 0 ? 'All' : r + '+'}

                                    </select>

                    ) : (

                                    {matchedVendors.map((vendor, idx) => (
                                        <div key={idx} className="bg-gray-800 border border-gray-700 rounded-xl p-5 hover:border-blue-500 transition cursor-pointer" onClick={() => setSelectedVendorProfile(vendor)}>

                                                <div className="flex items-center gap-3 mb-3">

                            </div>

                            {/* Redeemed History */}
                            {/* How to Earn Points */}
                            <div className="bg-gray-800 border border-gray-700 rounded-xl p-6">

                                        { action: 'Membership Sign-up', pts: '30-75', icon: 'shield', color: 'text-green-400' },
                                        { action: 'Post a Job', pts: 35, icon: 'fileText', color: 'text-cyan-400' },
                                        { action: 'Accept a Vendor Bid', pts: 20, icon: 'check', color: 'text-emerald-400' },
                                        { action: 'Share Referral Code', pts: 10, icon: 'users', color: 'text-pink-400' },
                                        { action: 'Daily Login', pts: 5, icon: 'user', color: 'text-gray-400' },
                                        { action: 'New Account Bonus', pts: 100, icon: 'star', color: 'text-amber-400' },

                                        <div key={i} className="flex items-center gap-3 bg-gray-700/50 rounded-lg px-4 py-3">
                                            <Icon name={item.icon} size={18} className={item.color} />

                                            <span className="text-amber-400 font-bold text-sm">+{item.pts} pts</span>

                            {redeemedRewards.length > 0 && (

                                    <div className="space-y-2">
                                        {redeemedRewards.map((r, i) => (
                                            <div key={i} className="flex items-center justify-between p-3 bg-gray-700 rounded-lg">
                                                <span className="text-white font-semibold">{r.name}</span>
                                                <div className="text-right">
                                                    <span className="text-amber-400 text-sm font-bold">-{r.points} pts</span>
                                                    <p className="text-gray-400 text-xs">{r.redeemedAt}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Redeem Confirmation Modal */}
                    {showRedeemModal && redeemItem && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onClick={(e) => e.target === e.currentTarget && setShowRedeemModal(false)}>
                            <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-sm p-6 text-center">
                                <div className="bg-amber-600/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="star" size={32} className="text-amber-400" />
                                </div>
                                <h3 className="text-xl font-bold text-white mb-2">Redeem Reward?</h3>

        };

        // Vendor List Page Component
        const VendorListPage = ({ selectedServiceCategory, setSelectedServiceCategory, setCurrentPage, earnPoints, openVendorProfile }) => {
            const allVendors = nycVendors[selectedServiceCategory] || [];
            const [sortBy, setSortBy] = useState('rating');
            const [minRating, setMinRating] = useState(0);
            const [locationFilter, setLocationFilter] = useState('All');
            const [verifiedOnly, setVerifiedOnly] = useState(false);

            const [expandedVendor, setExpandedVendor] = useState(null);

            // Get unique areas from vendors
            const uniqueAreas = ['All', 'Manhattan', 'Brooklyn', 'Queens', 'Bronx', 'Staten Island', 'North NJ', 'Central NJ', 'South NJ', 'Fairfield County, CT', 'Hartford County, CT', 'New Haven County, CT'];

            // Parse min price from price string like "$100-350"
            const getMinPrice = (priceStr) => {
                const match = priceStr.match(/\$([0-9,]+)/);
                return match ? parseInt(match[1].replace(',', '')) : 0;
            };

            // Filter vendors
            const filteredVendors = allVendors
                .filter(v => {
                    if (minRating > 0 && v.rating < minRating) return false;
                    if (verifiedOnly && !v.badge) return false;
                    if (locationFilter !== 'All' && !v.area.includes(locationFilter) && !v.area.includes('All') || v.area.includes('NYC, NJ, CT')) return false;
                    if (searchQuery && !v.name.toLowerCase().includes(searchQuery.toLowerCase()) && !v.description.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                    return true;
                })
                .sort((a, b) => {
                    if (sortBy === 'rating') return b.rating - a.rating;
                    if (sortBy === 'reviews') return b.reviews - a.reviews;
                    if (sortBy === 'price_low') return getMinPrice(a.price) - getMinPrice(b.price);
                    if (sortBy === 'price_high') return getMinPrice(b.price) - getMinPrice(a.price);
                    if (sortBy === 'name') return a.name.localeCompare(b.name);
                    return 0;

                        <div className="mb-6">

                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                {/* Sort By */}
                                <div>
                                    <label className="block text-gray-400 text-sm font-semibold mb-2">Sort By</label>
                                    <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500">

                                        <option value="reviews">Most Reviews</option>
                                        <option value="price_low">Price: Low to High</option>
                                        <option value="price_high">Price: High to Low</option>
                                        <option value="name">Name: A to Z</option>

                                </div>

                                    </div>
                                </div>
                                {/* Location */}

                                        {uniqueAreas.map(a => <option key={a} value={a}>{a}</option>)}
                                    </select>
                                </div>

                                        <Icon name="shieldCheck" size={16} /> {verifiedOnly ? 'Verified Only' : 'Show All'}
                                    </button>
                                </div>
                            </div>
                            {/* Active Filters Summary */}
                            {(minRating > 0 || locationFilter !== 'All' || verifiedOnly || searchQuery) && (
                                <div className="flex flex-wrap items-center gap-2 pt-3 border-t border-gray-700">
                                    <span className="text-gray-500 text-sm">Active filters:</span>
                                    {searchQuery && <span className="bg-blue-600/20 text-blue-400 text-xs font-semibold px-3 py-1 rounded-full">Search: "{searchQuery}"</span>}
                                    {minRating > 0 && <span className="bg-blue-600/20 text-blue-400 text-xs font-semibold px-3 py-1 rounded-full">{minRating}+ Stars</span>}
                                    {locationFilter !== 'All' && <span className="bg-purple-600/20 text-purple-400 text-xs font-semibold px-3 py-1 rounded-full">{locationFilter}</span>}
                                    {verifiedOnly && <span className="bg-amber-600/20 text-amber-400 text-xs font-semibold px-3 py-1 rounded-full">Verified Only</span>}
                                    <button onClick={() => { setMinRating(0); setLocationFilter('All'); setVerifiedOnly(false); setSearchQuery(''); }} className="text-red-400 hover:text-red-300 text-xs font-semibold ml-2">Clear All</button>
                                </div>
                            )}
                        </div>

                        {/* Results Count */}
                        <div className="flex items-center justify-between mb-6">
                            <p className="text-gray-400 text-sm">{filteredVendors.length} vendor{filteredVendors.length !== 1 ? 's' : ''} found</p>
                        </div>

                        {/* Vendor Cards */}
                        <div className="space-y-6">
                            {filteredVendors.length === 0 ? (
                                <div className="bg-gray-800 border border-gray-700 rounded-xl p-12 text-center">
                                    <Icon name="search" size={48} className="text-gray-600 mx-auto mb-4" />
                                    <h3 className="text-xl font-bold text-white mb-2">No vendors match your filters</h3>
                                    <p className="text-gray-400 mb-4">Try adjusting your filters or clearing them to see all results.</p>
                                    <button onClick={() => { setMinRating(0); setLocationFilter('All'); setVerifiedOnly(false); setSearchQuery(''); }} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-semibold transition">Clear All Filters</button>
                                </div>
                            ) : filteredVendors.map((vendor, idx) => {
                                const isExpanded = expandedVendor === idx;
                                return (
                                <div key={idx} className="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden hover:border-blue-500 transition cursor-pointer" onClick={() => openVendorProfile(vendor)}>

                                        <div className="flex flex-col md:flex-row md:items-start justify-between gap-4">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-2">
                                                    <h2 className="text-2xl font-bold text-white">{vendor.name}</h2>
                                                    {vendor.badge && (
                                                        <span className="bg-amber-500/20 text-amber-400 text-xs font-bold px-2 py-1 rounded flex items-center gap-1">
                                                            <Icon name="shieldCheck" size={14} /> Verified
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="flex items-center gap-2 mb-3">
                                                    <div className="flex gap-0.5">
                                                        {[...Array(5)].map((_, i) => (
                                                            <Icon key={i} name="star" size={16} filled={i < Math.floor(vendor.rating)} className={i < Math.floor(vendor.rating) ? 'text-amber-400' : 'text-gray-600'} />

                                                    <span className="text-white font-bold">{vendor.rating}</span>
                                                    <span className="text-gray-400">({vendor.reviews} reviews)</span>

                                                <div className="flex flex-wrap gap-4 text-sm">

                                                    <span className="flex items-center gap-1 text-gray-400"><Icon name="mapPin" size={14} className="text-blue-400" /> {vendor.area}</span>
                                                    {vendor.phone && <span className="flex items-center gap-1 text-gray-400"><Icon name="phone" size={14} className="text-purple-400" /> {vendor.phone}</span>}
                                                </div>
                                            </div>
                                            <div className="flex flex-col gap-2 min-w-[160px]">
                                                <button onClick={(e) => { e.stopPropagation(); setExpandedVendor(isExpanded ? null : idx); }} className={`${isExpanded ? 'bg-amber-600 hover:bg-amber-500' : 'bg-amber-600 hover:bg-amber-500'} text-white text-center px-6 py-3 rounded-lg font-semibold transition flex items-center justify-center gap-2`}>
                                                    <Icon name="calendar" size={18} /> {isExpanded ? 'Hide Calendar' : 'Book Now'}

                                                <a href={vendor.website} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="bg-blue-600 hover:bg-blue-500 text-white text-center px-6 py-3 rounded-lg font-semibold transition flex items-center justify-center gap-2">
                                                    <Icon name="globe" size={18} /> Visit Website
                                                </a>
                                                {vendor.phone && (
                                                    <a href={'tel:' + vendor.phone.replace(/[^0-9]/g, '')} onClick={(e) => e.stopPropagation()} className="bg-green-600 hover:bg-green-500 text-white text-center px-6 py-3 rounded-lg font-semibold transition flex items-center justify-center gap-2">
                                                        <Icon name="phone" size={18} /> Call Now
                                                    </a>

                                            </div>
                                        </div>
                                    </div>

                                    {/* Dropdown Calendar */}

                                            <CalendarSection provider={vendor} earnPoints={earnPoints} />

                                </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // Vendor Registration Page
        const RegisterBusinessPage = ({ setCurrentPage }) => {
            const [regForm, setRegForm] = useState({ businessName: '', ownerName: '', email: '', phone: '', category: '', website: '', address: '', borough: '', description: '', years: '', license: '', insured: false, agreeTerms: false });
            const [submitted, setSubmitted] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();

                    setSubmitted(true);

            if (submitted) {

                    <div className="min-h-screen bg-slate-950 py-16 px-4">

                                <div className="bg-green-600/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">

                                </div>

                                <p className="text-gray-300 mb-2">Thank you, <span className="text-white font-semibold">{regForm.businessName}</span>.</p>
                                <p className="text-gray-400 mb-8">Our team will review your application and get back to you within 1-2 business days at <span className="text-blue-400">{regForm.email}</span>.</p>
                                <div className="bg-gray-700/50 rounded-lg p-4 mb-8 text-left">

                                    <div className="space-y-2 text-sm text-gray-300">
                                        <p className="flex items-start gap-2"><span className="text-blue-400 font-bold mt-0.5">1.</span> We verify your business information and credentials</p>
                                        <p className="flex items-start gap-2"><span className="text-blue-400 font-bold mt-0.5">2.</span> A background check is conducted (if applicable)</p>
                                        <p className="flex items-start gap-2"><span className="text-blue-400 font-bold mt-0.5">3.</span> Your profile goes live and customers can find you</p>
                                        <p className="flex items-start gap-2"><span className="text-blue-400 font-bold mt-0.5">4.</span> Start receiving bookings and grow your business!</p>
                                    </div>
                                </div>
                                <button onClick={() => setCurrentPage('home')} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg font-semibold transition">Back to Home</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 py-8 px-4">
                    <div className="max-w-3xl mx-auto">
                        <button onClick={() => setCurrentPage('home')} className="text-blue-400 hover:text-blue-300 font-semibold mb-6 flex items-center gap-2">
                            <Icon name="chevronLeft" size={20} /> Back to Home
                        </button>

                        {/* Header */}
                        <div className="text-center mb-10">
                            <h1 className="text-4xl font-bold text-white mb-3">Register Your Business</h1>

                        {/* Benefits */}
                        <div className="grid md:grid-cols-3 gap-4 mb-10">
                            {[
                                { icon: 'users', title: 'Reach Customers', desc: 'Get discovered by thousands of homeowners in your area' },
                                { icon: 'dollarSign', title: 'Grow Revenue', desc: 'Increase bookings with our easy scheduling system' },
                                { icon: 'shieldCheck', title: 'Build Trust', desc: 'Earn verified badges and collect customer reviews' },
                            ].map((b, i) => (
                                <div key={i} className="bg-gray-800 border border-gray-700 rounded-lg p-5 text-center">

                                    <p className="text-gray-400 text-sm">{b.desc}</p>

                        {/* Registration Form */}

                                        <div className="space-y-4">
                                            {/* Role Badge */}
                                            <div className={`flex items-center gap-2 p-3 rounded-xl ${userType === 'vendor' ? 'bg-green-600/10 border border-green-600/30' : 'bg-blue-600/10 border border-blue-600/30'}`}>
                                                <Icon name={userType === 'vendor' ? 'wrench' : 'users'} size={18} className={userType === 'vendor' ? 'text-green-400' : 'text-blue-400'} />
                                                <span className={`text-sm font-semibold ${userType === 'vendor' ? 'text-green-400' : 'text-blue-400'}`}>
                                                    {userType === 'vendor' ? 'Vendor Account' : 'Customer Account'}
                                                </span>
                                                <button onClick={() => setAuthStep('role')} className="text-gray-400 hover:text-white text-xs ml-auto">Change</button>
                                            </div>

                                            <input type="email" placeholder="Email address" className="w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 placeholder-gray-500 transition" />
                                            <input type="password" placeholder="Password" className="w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 placeholder-gray-500 transition" />

                                            {!isLogin && (
                                                <>
                                                    <input type="text" placeholder="Full Name" className="w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 placeholder-gray-500 transition" />
                                                    <input type="tel" placeholder="Phone Number" className="w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 placeholder-gray-500 transition" />
                                                    {userType === 'vendor' && (
                                                        <>
                                                            <input type="text" placeholder="Business Name" className="w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-green-500 placeholder-gray-500 transition" />
                                                            <select className="w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-green-500 transition">
                                                                <option value="" className="text-gray-500">Service Category</option>
                                                                {serviceCategories.map(cat => <option key={cat.id} value={cat.name}>{cat.name}</option>)}
                                                            </select>
                                                            <input type="text" placeholder="License Number (optional)" className="w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-green-500 placeholder-gray-500 transition" />
                                                        </>
                                                    )}
                                                </>
                                            )}

                                            <button
                                                onClick={() => {
                                                    setIsAuthenticated(true);
                                                    setShowAuthModal(false);
                                                    setAuthStep('role');
                                                    setCurrentPage(userType === 'vendor' ? 'vendordash' : 'dashboard');
                                                    if (!isLogin && userType === 'user') earnPoints(100, 'Welcome bonus! Account created');
                                                    if (isLogin && userType === 'user') earnPoints(5, 'Daily login bonus');
                                                }}
                                                className={`w-full font-bold py-3 rounded-xl transition text-white ${userType === 'vendor' ? 'bg-green-600 hover:bg-green-500' : 'bg-blue-600 hover:bg-blue-500'}`}
                                            >
                                                {isLogin ? 'Log In' : 'Create Account'}
                                            </button>

                                            <div className="relative">
                                                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-700"></div></div>
                                                <div className="relative flex justify-center"><span className="px-3 text-gray-500 text-sm bg-gray-900">or</span></div>
                                            </div>

                                            <button className="w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
                                                <span className="text-lg">G</span> Continue with Google
                                            </button>

                                            <button onClick={() => setIsLogin(!isLogin)} className="w-full text-center text-gray-400 hover:text-white py-2 text-sm transition">
                                                {isLogin ? "Don't have an account? " : 'Already have an account? '}
                                                <span className={userType === 'vendor' ? 'text-green-400' : 'text-blue-400'}>{isLogin ? 'Sign up' : 'Log in'}</span>
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HomeHub />);
    </script>
</body>
</html>
